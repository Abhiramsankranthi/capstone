date_range:
  start: "2000-01-01"
  end: "2025-12-31"

equity:
  benchmark: "^GSPC"
  sector_etfs:
    - XLK
    - XLF
    - XLE
    - XLV
    - XLY
    - XLP
    - XLI
    - XLB
    - XLU
    - XLRE
    - XLC

volatility:
  tickers:
    - "^VIX"
    - "^VIX3M"

fred:
  series:
    CPIAUCSL: "CPI All Urban Consumers"
    UNRATE: "Unemployment Rate"
    DFF: "Effective Federal Funds Rate"
    INDPRO: "Industrial Production Index"
    T10Y2Y: "10Y-2Y Treasury Spread"

sentiment:
  raw_dir: "data/raw"
  finance_categories:
    - BUSINESS
    - MONEY
  finbert_model: "ProsusAI/finbert"
  batch_size: 16
  max_seq_length: 128

features:
  rolling_windows: [5, 21]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  vix_percentile_window: 252

hmm:
  n_states_candidates: [2, 3, 4]
  input_features: ["sp500_log_return", "sp500_realized_vol_21d"]
  n_iter: 200
  random_state: 42
  n_fits: 10

targets:
  forward_returns: [1, 5]

deep_learning:
  seed: 42
  device: "cpu"
  sequence_length: 30
  min_train_size: 756
  step_size: 126
  max_folds: null
  val_fraction: 0.15
  min_train_sequences: 200
  batch_size: 64
  max_epochs: 25
  tuning_trials: 4
  tuning_max_epochs: 10
  patience: 4
  learning_rate: 0.001
  weight_decay: 0.00001
  dropout: 0.2
  lstm_hidden_size: 64
  lstm_layers: 2
  transformer_d_model: 64
  transformer_heads: 4
  transformer_layers: 2
  models: ["lstm", "tft"]
